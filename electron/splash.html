<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Raptor Runner</title>
    <style>
      /*
       * Splash shown from app launch until the main renderer finishes
       * its first paint. The main process closes this window on the
       * main window's ready-to-show event.
       *
       * Sky-blue background matches the game's sky so the transition
       * to the game is visually seamless.
       */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: linear-gradient(180deg, #50b4cd 0%, #7ec9dd 100%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        color: #ffffff;
        user-select: none;
        -webkit-user-select: none;
        -webkit-app-region: drag; /* let the user drag the splash around */
      }

      .stage {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
      }

      /* Animated ground baseline */
      .ground {
        width: 200px;
        height: 3px;
        background: rgba(255, 255, 255, 0.35);
        border-radius: 2px;
        position: relative;
        overflow: hidden;
      }
      .ground::after {
        content: "";
        position: absolute;
        top: 0;
        left: -60px;
        width: 60px;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          #ffffff,
          transparent
        );
        animation: scan 1.6s linear infinite;
      }
      @keyframes scan {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(260px);
        }
      }

      .raptor-wrap {
        height: 120px;
        display: flex;
        align-items: flex-end;
      }
      .raptor {
        height: 110px;
        width: auto;
        image-rendering: pixelated;
        image-rendering: -moz-crisp-edges;
        filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.18));
        animation: bob 1.2s ease-in-out infinite;
      }
      @keyframes bob {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      .title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 3px;
        text-transform: uppercase;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      }

      .dots {
        display: flex;
        gap: 6px;
        margin-top: 4px;
      }
      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #ffffff;
        opacity: 0.6;
        animation: blink 1.2s ease-in-out infinite;
      }
      .dot:nth-child(2) {
        animation-delay: 0.15s;
      }
      .dot:nth-child(3) {
        animation-delay: 0.3s;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 0.25;
          transform: translateY(0);
        }
        50% {
          opacity: 1;
          transform: translateY(-3px);
        }
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="raptor-wrap">
        <!-- Raptor image src is injected from main.ts via ?raptor= query
             so the same splash.html works in dev (public/assets/...) and
             prod (app.asar/dist/...). Falls back gracefully if missing. -->
        <img id="raptor" class="raptor" alt="" />
      </div>
      <div class="ground"></div>
      <div class="title">Raptor Runner</div>
      <div class="dots" aria-hidden="true">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
    <script>
      const params = new URLSearchParams(location.search);
      const raptor = params.get("raptor");
      const img = document.getElementById("raptor");
      if (raptor) img.src = raptor;
      else img.style.display = "none";
    </script>
  </body>
</html>
