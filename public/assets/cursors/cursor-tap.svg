<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
  <!--
    Tap/active cursor — inverted-palette arrow shown while the
    pointer is pressed on an interactive element. Same 24×24
    silhouette + (2, 2) hotspot as cursor-default.svg so clicks
    still land at the tip. Comment lives inside <svg> so the
    image loader accepts the file (the previous leading-comment
    form parsed as invalid in Chrome/Safari cursor pipelines).
  -->
  <path d="M2.4 2.4 L2.4 17 L7 13.6 L10.5 21 L14 19.6 L10.5 12.8 L16.5 12.8 Z"
        fill="#2a1d13"
        stroke="#fbebc6"
        stroke-width="2"
        stroke-linejoin="miter"
        stroke-linecap="square"/>
</svg>
