<!--
  Tap/active cursor — shown while the mouse button is held down on
  an interactive element. Inverted colour scheme (dune fill, sand
  stroke) so the press state reads as "pushed in" next to the
  default arrow. Shares the 20×20 viewBox + (2, 2) hotspot with
  cursor-default.svg so the click still lands at the arrow tip.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20">
  <path d="M2 2 L2 15 L6 12 L9 18 L12 17 L9 11 L14 11 Z"
        fill="#2a1d13"
        stroke="#fbebc6"
        stroke-width="1.8"
        stroke-linejoin="miter"
        stroke-linecap="square"/>
</svg>
