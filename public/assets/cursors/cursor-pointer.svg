<!--
  Pointer cursor — classic pixel-art pointing hand. 32×32 viewBox with
  the index finger extended up and the thumb sticking out to the right,
  drawn as axis-aligned rectangles (no curves) so it reads as blocky
  pixel art matching the default arrow. Index-tip at (~14, 3); set the
  CSS hotspot to 14 3 so clicks land on the fingertip.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <path d="M12 3 L17 3 L17 13 L20 13 L20 10 L24 10 L24 16 L26 16 L26 22 L24 27 L11 27 L7 22 L7 17 L10 14 L12 14 Z"
        fill="#f4e4c1"
        stroke="#3d2817"
        stroke-width="2.5"
        stroke-linejoin="miter"
        stroke-linecap="square"/>
</svg>
