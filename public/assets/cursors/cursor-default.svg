<!--
  Default cursor — chunky pixel-art arrow in the game's desert palette.
  32×32 viewBox, drawn with 45°/90° segments and a 2.5 px outline so the
  silhouette reads as blocky, not vector-slick. Tip at (3, 3); set the
  CSS hotspot to 3 3 so clicks land at the tip.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <path d="M3 3 L3 23 L9 18 L13 27 L17 25 L13 17 L21 17 Z"
        fill="#f4e4c1"
        stroke="#3d2817"
        stroke-width="2.5"
        stroke-linejoin="miter"
        stroke-linecap="square"/>
</svg>
