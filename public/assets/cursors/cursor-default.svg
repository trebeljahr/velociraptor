<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
  <!--
    Default cursor — pixel-art arrow in the brand palette
    (sand-contrast fill, dune stroke). Comment must live INSIDE the
    <svg> root; Chrome / Safari image+cursor loaders reject SVG
    files that start with a comment or text node before the root,
    which is why the earlier version silently fell back to the
    system arrow. 24×24 viewBox, tip at (2.4, 2.4) — CSS hotspot
    is (2, 2) rounded so clicks land at the tip.
  -->
  <path d="M2.4 2.4 L2.4 17 L7 13.6 L10.5 21 L14 19.6 L10.5 12.8 L16.5 12.8 Z"
        fill="#fbebc6"
        stroke="#2a1d13"
        stroke-width="2"
        stroke-linejoin="miter"
        stroke-linecap="square"/>
</svg>
