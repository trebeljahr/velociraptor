<!--
  Default cursor — pixel-art arrow in the game's brand palette
  (--color-sand-contrast fill, --color-dune stroke). 20×20 viewBox
  so the cursor feels lightweight next to the chunky raptor-footprint
  pointer. Tip at (2, 2); set the CSS hotspot to 2 2 so clicks land
  at the arrow tip.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20">
  <path d="M2 2 L2 15 L6 12 L9 18 L12 17 L9 11 L14 11 Z"
        fill="#fbebc6"
        stroke="#2a1d13"
        stroke-width="1.8"
        stroke-linejoin="miter"
        stroke-linecap="square"/>
</svg>
