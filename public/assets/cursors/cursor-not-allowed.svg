<!--
  Not-allowed cursor — shown over :disabled controls and readonly
  surfaces. Same chunky arrow silhouette as cursor-default.svg with
  a red "prohibition" circle+slash overlay so the state reads at a
  glance. 20×20 viewBox, hotspot at (2, 2) so it aligns with the
  other cursors in the set.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20">
  <path d="M2 2 L2 15 L6 12 L9 18 L12 17 L9 11 L14 11 Z"
        fill="#fbebc6"
        stroke="#2a1d13"
        stroke-width="1.8"
        stroke-linejoin="miter"
        stroke-linecap="square"/>
  <circle cx="14" cy="14" r="4.5"
          fill="none"
          stroke="#c0392b"
          stroke-width="1.6"/>
  <line x1="11" y1="17" x2="17" y2="11"
        stroke="#c0392b"
        stroke-width="1.6"
        stroke-linecap="round"/>
</svg>
