<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
  <!--
    Not-allowed cursor — the default arrow plus a red
    circle-and-slash prohibition mark on the lower-right. Shown
    over :disabled controls. Same 24×24 silhouette + (2, 2)
    hotspot as cursor-default.svg. Comment lives inside <svg> so
    the image loader doesn't reject it (leading comments parse
    as invalid in Chrome/Safari cursor pipelines).
  -->
  <path d="M2.4 2.4 L2.4 17 L7 13.6 L10.5 21 L14 19.6 L10.5 12.8 L16.5 12.8 Z"
        fill="#fbebc6"
        stroke="#2a1d13"
        stroke-width="2"
        stroke-linejoin="miter"
        stroke-linecap="square"/>
  <circle cx="17" cy="17" r="5.5"
          fill="none"
          stroke="#c0392b"
          stroke-width="1.8"/>
  <line x1="13.4" y1="20.6" x2="20.6" y2="13.4"
        stroke="#c0392b"
        stroke-width="1.8"
        stroke-linecap="round"/>
</svg>
